<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zcaro - Wormhole Editor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'app-bg': 'rgb(var(--color-bg) / <alpha-value>)',
            'app-text': 'rgb(var(--color-text) / <alpha-value>)',
            'app-muted': 'rgb(var(--color-text-muted) / <alpha-value>)',
            'app-primary': 'rgb(var(--color-primary) / <alpha-value>)',
            'app-primary-light': 'rgb(var(--color-primary-light) / <alpha-value>)',
            'app-accent': 'rgb(var(--color-accent) / <alpha-value>)',
          },
          fontFamily: {
            poppins: ['Poppins', 'sans-serif'],
            inter: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css?v=1.1">
</head>
<body class="text-app-text h-screen w-screen overflow-hidden bg-app-bg relative font-inter transition-colors duration-300">

  <!-- Background Gradient / Noise -->
  <div class="absolute inset-0 bg-app-gradient z-0 pointer-events-none transition-all duration-300"></div>

  <!-- ═══════════════════════════════════════════════════════════════════════
       MOBILE LAYOUT (visible only on < md screens)
       ═══════════════════════════════════════════════════════════════════════ -->

  <!-- Mobile Header -->
  <header id="mobile-header" class="flex md:hidden fixed top-0 left-0 right-0 z-40 h-12 glass-panel items-center justify-between px-3 border-b border-glass-border">
    <div class="flex items-center gap-2">
      <img src="zcaro-icon-only.svg" alt="Zcaro Logo" class="w-6 h-6 drop-shadow-md">
      <span class="font-poppins font-semibold text-sm text-app-text">Zcaro</span>
      <div class="w-px h-4 bg-white/20 mx-1"></div>
      <select id="board-size-select-mobile" class="bg-transparent text-xs text-app-muted outline-none cursor-pointer focus:ring-0 appearance-none font-medium">
        <option value="9">9×9</option>
        <option value="13">13×13</option>
        <option value="15">15×15</option>
        <option value="17" selected>17×17</option>
        <option value="19">19×19</option>
      </select>
    </div>
    <div class="flex items-center gap-2">
      <!-- Safe Mode toggle -->
      <button id="btn-safe-mode-mobile" class="w-8 h-8 rounded-full flex items-center justify-center text-app-muted hover:text-app-text hover:bg-white/10 transition-colors text-base" title="Safe Mode">
        <span id="safe-mode-icon-mobile">🔒</span>
      </button>
      <!-- Panels toggle -->
      <button id="btn-panels-mobile" class="w-8 h-8 rounded-full flex items-center justify-center text-app-muted hover:text-app-text hover:bg-white/10 transition-colors" title="Panels">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"></path></svg>
      </button>
      <!-- ⋯ More menu trigger -->
      <button id="btn-more-mobile" class="w-8 h-8 rounded-full flex items-center justify-center text-app-muted hover:text-app-text hover:bg-white/10 transition-colors" aria-label="More options">
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></svg>
      </button>
    </div>
  </header>

  <!-- Mobile ⋯ Dropdown Menu -->
  <div id="mobile-more-menu" class="hidden fixed top-12 right-2 z-50 glass-panel rounded-2xl p-2 flex-col gap-1 shadow-xl w-52 border border-glass-border">
    <!-- Theme -->
    <div class="flex items-center gap-3 px-3 py-2 rounded-xl hover:bg-white/5 text-sm text-app-muted">
      <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"></path></svg>
      <select id="theme-select-mobile" class="bg-transparent text-sm font-medium outline-none cursor-pointer focus:ring-0 appearance-none flex-1">
        <option value="dark">Dark Space</option>
        <option value="light">Light Minimal</option>
        <option value="classic">Classic Paper</option>
        <option value="cyberpunk">Cyberpunk</option>
      </select>
    </div>
    <!-- Lang -->
    <div class="flex items-center gap-2 px-3 py-2 rounded-xl text-sm text-app-muted">
      <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"/></svg>
      <span class="flex-1" data-i18n="language">Language</span>
      <div class="flex gap-1">
        <button class="lang-btn-mobile px-2 py-0.5 rounded text-xs font-medium bg-white/10 text-app-text" data-lang="en">EN</button>
        <button class="lang-btn-mobile px-2 py-0.5 rounded text-xs font-medium text-app-muted hover:bg-white/10" data-lang="vi">VI</button>
      </div>
    </div>
    <div class="h-px bg-white/10 mx-2"></div>
    <!-- Scan Board -->
    <label for="img-upload-mobile" class="flex items-center gap-3 px-3 py-2 rounded-xl hover:bg-white/5 text-sm text-app-primary-light cursor-pointer">
      <span class="text-base">📸</span>
      <span data-i18n="uploadZcr">AI Board Scan</span>
    </label>
    <input type="file" id="img-upload-mobile" accept="image/*" class="hidden">
    <!-- Share -->
    <button id="btn-share-link-mobile" class="flex items-center gap-3 px-3 py-2 rounded-xl hover:bg-white/5 text-sm text-app-muted w-full">
      <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
      <span data-i18n="shareLink">Share Link</span>
    </button>
    <!-- Export -->
    <button id="btn-export-mobile" class="flex items-center gap-3 px-3 py-2 rounded-xl hover:bg-white/5 text-sm text-app-muted w-full">
      <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
      <span data-i18n="downloadPNG">Download PNG</span>
    </button>
    <div class="h-px bg-white/10 mx-2"></div>
    <!-- Clear -->
    <button id="btn-clear-mobile" class="flex items-center gap-3 px-3 py-2 rounded-xl hover:bg-app-accent/10 text-sm text-app-accent/80 w-full">
      <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
      <span data-i18n="clear">Clear Board</span>
    </button>
  </div>

  <!-- Safe Mode Confirm Hint (Mobile) -->
  <div id="safe-mode-hint-mobile" class="hidden md:hidden fixed top-12 left-0 right-0 z-40 mx-2 mt-1 glass-panel rounded-xl px-3 py-2 items-center gap-2 bg-app-accent/10 border-app-accent/30">
    <span class="text-xs text-app-accent font-bold animate-pulse" data-i18n="tapAgain">TAP AGAIN TO CONFIRM:</span>
    <span id="safe-mode-cell-mobile" class="text-xs font-bold text-app-text"></span>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════════════
       LEFT SIDEBAR (Analysis Tree)
       ═══════════════════════════════════════════════════════════════════════ -->

  <!-- ═══════════════════════════════════════════════════════════════════════
       RIGHT SIDEBAR (Desktop only)
       ═══════════════════════════════════════════════════════════════════════ -->

  <!-- Fullscreen Canvas Area (with Push/Pull transition) -->
  <div id="board-container" class="absolute inset-0 z-0 flex items-center justify-center cursor-crosshair transition-all duration-300">
    <div class="relative shadow-2xl" id="canvas-wrapper">
      <canvas id="canvas-static" class="absolute inset-0 z-10"></canvas>
      <canvas id="canvas-dynamic" class="relative z-20"></canvas>
    </div>
  </div>

  <!-- Touch Zoom Preview -->
  <div id="touch-zoom" class="hidden absolute z-50 pointer-events-none rounded-full overflow-hidden border-2 border-app-primary/50 shadow-[0_0_20px_var(--color-primary-50)]">
    <canvas id="zoom-canvas" width="180" height="180" class="bg-app-bg/90"></canvas>
    <div id="zoom-crosshair" class="absolute top-1/2 left-1/2 w-4 h-4 -translate-x-1/2 -translate-y-1/2 border border-white/50 rounded-full"></div>
    <div id="zoom-label" class="absolute bottom-2 left-1/2 -translate-x-1/2 bg-black/60 px-2 py-0.5 rounded text-xs font-bold text-white">A1</div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════════════
       DESKTOP LAYOUT (hidden on mobile)
       ═══════════════════════════════════════════════════════════════════════ -->

  <!-- Top Left: Brand & Board Config -->
  <header class="hidden md:flex absolute top-6 left-6 z-30 items-center gap-4">
    <div class="glass-panel rounded-2xl px-5 py-3 flex items-center gap-3">
      <h1 class="text-xl font-poppins font-semibold tracking-wide flex items-center gap-3">
        <img src="zcaro-icon-only.svg" alt="Zcaro Logo" class="w-8 h-8 drop-shadow-[0_0_8px_rgba(123,92,245,0.6)] hover:scale-105 transition-transform cursor-pointer">
        <span class="app-title text-app-text">Zcaro</span>
      </h1>
      <div class="w-px h-5 bg-white/20"></div>
      <select id="board-size-select" class="bg-transparent text-sm text-app-muted outline-none cursor-pointer focus:ring-0 appearance-none font-medium">
        <option value="9">9×9</option>
        <option value="13">13×13</option>
        <option value="15">15×15</option>
        <option value="17" selected>17×17</option>
        <option value="19">19×19</option>
      </select>
    </div>

    <!-- Actions Group: Safe Mode, Auto Switch, Scan Board -->
    <div class="glass-panel rounded-xl px-1.5 py-1.5 flex items-center gap-1">
      
      <!-- Safe Mode -->
      <button id="btn-safe-mode" class="act-btn px-3 py-1.5 rounded-lg flex items-center gap-2 text-sm font-medium text-app-muted hover:text-app-text hover:bg-white/10 transition-colors group [&.active]:text-app-accent [&.active]:bg-app-accent/10">
        <svg id="safe-mode-icon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <!-- Default: Locked -->
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
        </svg>
        <span data-i18n="safeMode">Safe Mode</span>
      </button>

      <div class="w-px h-4 bg-white/20 mx-1"></div>

      <!-- Auto Switch (Toggle Switch) -->
      <label class="px-3 py-1.5 rounded-lg flex items-center gap-2 text-sm font-medium text-app-muted cursor-pointer hover:text-app-text hover:bg-white/10 transition-colors group relative">
        <input type="checkbox" id="auto-switch-cb" checked class="sr-only peer">
        <div class="w-8 h-4 bg-black/30 rounded-full peer peer-checked:bg-app-primary/80 transition-all duration-300 relative border border-white/10 after:content-[''] after:absolute after:w-3 after:h-3 after:bg-white after:rounded-full after:left-[1px] after:top-[1px] peer-checked:after:translate-x-4 after:transition-transform after:duration-300 after:shadow-sm">
        </div>
        <span data-i18n="autoSwitch">Auto-switch</span>
      </label>

      <div class="w-px h-4 bg-white/20 mx-1"></div>
      
      <!-- Scan Board -->
      <label for="img-upload" class="px-3 py-1.5 rounded-lg flex items-center gap-2 text-sm font-medium text-app-primary hover:text-app-primary-light hover:bg-white/10 cursor-pointer transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path>
        </svg>
        <span data-i18n="uploadZcr">AI Board Scan</span>
      </label>
      <input type="file" id="img-upload" accept="image/*" class="hidden">
    </div>
    
    <!-- Safe Mode Hint -->
    <div id="safe-mode-hint" class="hidden glass-panel rounded-xl px-3 py-2 flex items-center gap-2 bg-app-accent/10 border-app-accent/30">
      <span class="text-xs text-app-accent font-bold animate-pulse" data-i18n="tapAgain">TAP AGAIN TO CONFIRM:</span>
      <span id="safe-mode-cell" class="text-xs font-bold text-app-text"></span>
    </div>
  </header>

  <!-- Top Right: Actions -->
  <div id="top-right-actions" class="hidden md:flex absolute top-6 right-6 z-30 items-center gap-3 transition-all duration-300 [&.sidebar-open]:right-[23.5rem]">
    <!-- Theme Selector -->
    <div class="relative group" id="theme-dropdown-container">
      <button id="theme-select-btn" class="glass-panel rounded-xl flex items-center px-3 py-1.5 gap-2 text-app-muted hover:text-app-text transition-colors cursor-pointer">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"></path></svg>
        <span id="theme-select-label" class="text-sm font-medium">Dark Space</span>
      </button>
      <div id="theme-select-menu" class="absolute top-full right-0 mt-2 w-36 glass-panel rounded-xl shadow-2xl opacity-0 scale-95 pointer-events-none transition-all duration-200 flex flex-col overflow-hidden z-50">
        <button class="text-left px-4 py-2 text-sm font-medium text-app-muted hover:text-app-text hover:bg-white/10 transition-colors theme-option" data-theme-val="dark">Dark Space</button>
        <button class="text-left px-4 py-2 text-sm font-medium text-app-muted hover:text-app-text hover:bg-white/10 transition-colors theme-option" data-theme-val="light">Light Minimal</button>
        <button class="text-left px-4 py-2 text-sm font-medium text-app-muted hover:text-app-text hover:bg-white/10 transition-colors theme-option" data-theme-val="classic">Classic Paper</button>
        <button class="text-left px-4 py-2 text-sm font-medium text-app-muted hover:text-app-text hover:bg-white/10 transition-colors theme-option" data-theme-val="cyberpunk">Cyberpunk</button>
      </div>
    </div>

    <!-- Lang -->
    <div class="glass-panel rounded-xl flex items-center p-1">
      <button id="btn-lang-en" class="lang-btn active px-3 py-1.5 rounded-lg text-sm text-app-muted font-medium transition-all hover:text-app-text data-[active]:bg-white/10 data-[active]:text-app-text" data-lang="en">EN</button>
      <button id="btn-lang-vi" class="lang-btn px-3 py-1.5 rounded-lg text-sm text-app-muted font-medium transition-all hover:text-app-text data-[active]:bg-white/10 data-[active]:text-app-text" data-lang="vi">VI</button>
    </div>

    <div class="glass-panel rounded-xl flex items-center p-1 gap-1">
      <button id="btn-share-link" class="act-btn px-3 py-1.5 rounded-lg text-sm text-app-muted hover:bg-white/10 hover:text-app-text transition-all flex items-center gap-2" data-i18n-title="shareLink">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
      </button>
      <button id="btn-copy-img" class="act-btn px-3 py-1.5 rounded-lg text-sm text-app-muted hover:bg-white/10 hover:text-app-text transition-all flex items-center gap-2" data-i18n-title="copy">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
      </button>
      <button id="btn-export" class="act-btn px-3 py-1.5 rounded-lg text-sm bg-app-primary/20 text-app-primary-light hover:bg-app-primary/30 hover:text-app-text border border-app-primary/30 transition-all flex items-center gap-2" data-i18n-title="downloadPNG">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
      </button>
    </div>
  </div>

  <!-- Bottom Floating Toolbar (Desktop) — shadow NOT clipped -->
  <nav id="bottom-toolbar" class="hidden md:flex absolute bottom-8 left-1/2 -translate-x-1/2 z-30">
    <div class="glass-panel rounded-full px-3 py-2 flex items-center gap-1 shadow-[0_8px_48px_rgba(0,0,0,0.6)]">
      
      <!-- Undo / Redo -->
      <button id="btn-undo" class="w-10 h-10 rounded-full flex items-center justify-center text-app-muted hover:text-app-text hover:bg-white/10 transition-colors disabled:opacity-30 disabled:cursor-not-allowed" data-i18n-title="shortcutUndo">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"></path></svg>
      </button>
      <button id="btn-redo" class="w-10 h-10 rounded-full flex items-center justify-center text-app-muted hover:text-app-text hover:bg-white/10 transition-colors disabled:opacity-30 disabled:cursor-not-allowed" data-i18n-title="shortcutRedo">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 10h-10a8 8 0 00-8 8v2M21 10l-6 6m6-6l-6-6"></path></svg>
      </button>

      <div class="w-px h-8 bg-white/10 mx-2"></div>

      <!-- Tools -->
      <div id="tool-palette" class="flex items-center gap-1">
        <button class="tool-btn active w-12 h-12 rounded-full flex items-center justify-center transition-all duration-200 hover:bg-white/10 relative" data-tool="stone_x" data-i18n-title="toolBlackStone">
          <div class="w-6 h-6 rounded-full bg-slate-900 border border-slate-700 shadow-md"></div>
        </button>
        <button class="tool-btn w-12 h-12 rounded-full flex items-center justify-center transition-all duration-200 hover:bg-white/10 relative text-app-muted" data-tool="stone_o" data-i18n-title="toolWhiteStone">
          <div class="w-6 h-6 rounded-full bg-[#f5f0e8] border border-slate-300 shadow-md"></div>
        </button>
        
        <button class="tool-btn w-12 h-12 rounded-full flex items-center justify-center transition-all duration-200 hover:bg-white/10 relative text-app-muted" data-tool="block" data-i18n-title="toolBlock">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 4h16v16H4z M4 9h16 M4 14h16 M9 4v5 M15 9v5 M9 14v6"></path></svg>
        </button>

        <div class="w-px h-8 bg-white/10 mx-1"></div>

        <div class="relative group flex items-center compound-tool">
          <button class="tool-btn w-12 h-12 rounded-full flex items-center justify-center transition-all duration-200 hover:bg-white/10 relative text-app-muted" data-tool="hole" data-i18n-title="toolHole">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 2l8 4.5v9L12 22l-8-4.5v-9L12 2z"></path></svg>
          </button>
          <div class="absolute bottom-full left-1/2 -translate-x-1/2 pb-2 hidden group-hover:flex flex-col items-center">
            <div id="hole-color-picker" class="glass-panel rounded-full p-2 flex gap-2 shadow-xl border-white/10 transition-all"></div>
          </div>
        </div>

        <div class="relative group flex items-center compound-tool">
          <button class="tool-btn w-12 h-12 rounded-full flex items-center justify-center transition-all duration-200 hover:bg-white/10 relative text-app-muted" data-tool="line" data-i18n-title="toolLine">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 7l-10 10"></path></svg>
          </button>
          <div class="absolute bottom-full left-1/2 -translate-x-1/2 pb-2 hidden group-hover:flex flex-col items-center">
            <div id="line-color-picker" class="glass-panel rounded-full p-2 flex gap-2 shadow-xl border-white/10 transition-all"></div>
          </div>
        </div>

        <div class="w-px h-8 bg-white/10 mx-1"></div>

        <button class="tool-btn w-12 h-12 rounded-full flex items-center justify-center transition-all duration-200 hover:bg-app-accent/20 hover:text-app-accent text-app-muted relative" data-tool="eraser" data-i18n-title="toolEraser">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
        </button>
      </div>
    </div>
  </nav>

  <!-- Right Sidebar Toggle Button (Desktop only) -->
  <button id="btn-toggle-sidebar" class="hidden md:flex fixed top-1/2 right-0 [&.sidebar-open]:right-[22rem] -translate-y-1/2 z-50 glass-panel border-r-0 rounded-l-2xl px-2 py-6 text-app-muted hover:text-app-text hover:bg-white/10 transition-all duration-300 shadow-xl group" title="Toggle Sidebar">
    <svg class="w-5 h-5 transition-transform duration-300 transform group-[.sidebar-open]:rotate-180 rotate-180 group-[.sidebar-open]:rotate-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
  </button>


  <!-- Mobile Sidebar Backdrop -->
  <div id="sidebar-backdrop" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-40 md:hidden opacity-0 transition-opacity duration-300 pointer-events-none [&.open]:opacity-100 [&.open]:pointer-events-auto"></div>

  <!-- Right Sidebar (Responsive) -->
  <aside id="right-sidebar" class="flex fixed top-0 right-0 bottom-0 z-50 w-[22rem] max-w-[85vw] flex-col bg-white/5 dark:bg-black/20 backdrop-blur-3xl border-l border-white/10 shadow-[-10px_0_40px_rgba(0,0,0,0.2)] transition-transform duration-300 transform translate-x-full pt-20 pb-24 px-4 overflow-hidden [&.sidebar-open]:translate-x-0">
    
    <div id="pending-hole-hint" class="pointer-events-auto hidden rounded-xl p-3 mb-4 bg-app-primary/10 border border-app-primary/30 shadow-[0_0_15px_var(--color-primary-30)]">
      <p class="text-sm text-app-primary-light font-medium flex items-center gap-2">
        <span class="animate-pulse">✦</span> Select destination portal
      </p>
      <button id="btn-cancel-portal" class="mt-2 w-full py-1.5 rounded-lg bg-white/5 hover:bg-white/10 border border-white/10 text-xs text-app-muted transition-colors" data-i18n="cancel">Cancel</button>
    </div>

    <div class="flex-1 overflow-y-auto custom-scrollbar flex flex-col gap-4 pb-4">
      <!-- Portals -->
      <div class="panel collapsible flex flex-col shrink-0 glass-panel rounded-2xl border border-white/5 overflow-hidden shadow-sm" id="portals-panel">
        <div class="panel-hd px-4 py-3 flex justify-between items-center cursor-pointer hover:bg-white/5 transition-colors group" data-toggle="portals-panel">
          <span class="font-inter font-semibold text-xs uppercase tracking-wider text-app-muted group-hover:text-app-text transition-colors flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 2l8 4.5v9L12 22l-8-4.5v-9L12 2z"></path></svg>
            <span data-i18n="panelPortals">Portals</span>
          </span>
          <svg class="collapse-icon w-4 h-4 text-app-muted group-hover:text-app-text transition-all duration-300 transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
        </div>
        <div class="panel-body px-4 pb-4 pt-1">
          <div id="holes-list" class="flex flex-col gap-2"></div>
        </div>
      </div>

      <!-- History -->
      <div class="panel collapsible flex flex-col flex-1 min-h-[200px] glass-panel rounded-2xl border border-white/5 overflow-hidden shadow-sm" id="history-panel">
        <div class="panel-hd px-4 py-3 flex justify-between items-center cursor-pointer hover:bg-white/5 transition-colors group" data-toggle="history-panel">
          <span class="font-inter font-semibold text-xs uppercase tracking-wider text-app-muted group-hover:text-app-text transition-colors flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
            <span data-i18n="panelHistory">History</span>
          </span>
          <div class="flex items-center gap-3">
            <button id="btn-clear-history" class="text-xs font-medium text-app-muted hover:text-app-text transition-colors" data-i18n="clearHistory">Clear</button>
            <svg class="collapse-icon w-4 h-4 text-app-muted group-hover:text-app-text transition-all duration-300 transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
          </div>
        </div>
        <div class="panel-body px-4 pb-4 pt-1 h-full overflow-y-auto custom-scrollbar">
          <div id="history-list" class="flex flex-col gap-1.5">
            <div class="text-xs text-app-muted italic p-2 flex flex-col items-center justify-center h-20 opacity-50" data-i18n="noMovesYet">
              <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 12H4"></path></svg>
              No moves yet.
            </div>
          </div>
        </div>
      </div>

      <!-- Notation -->
      <div class="panel collapsible collapsed flex flex-col shrink-0 glass-panel rounded-2xl border border-white/5 overflow-hidden shadow-sm" id="notation-panel">
        <div class="panel-hd px-4 py-3 flex justify-between items-center cursor-pointer hover:bg-white/5 transition-colors group" data-toggle="notation-panel">
          <span class="font-inter font-semibold text-xs uppercase tracking-wider text-app-muted group-hover:text-app-text transition-colors flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
            <span data-i18n="panelNotation">Notation</span>
          </span>
          <div class="flex items-center gap-3">
            <button id="btn-parse-notation" class="text-xs font-semibold bg-app-primary/10 text-app-primary-light px-3 py-1 rounded-md hover:bg-app-primary/20 transition-colors border border-app-primary/20" data-i18n="btnApply">Apply</button>
            <svg class="collapse-icon w-4 h-4 text-app-muted group-hover:text-app-text transition-all duration-300 transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
          </div>
        </div>
        <div class="panel-body p-4 flex flex-col gap-3">
          <textarea id="notation-input" class="w-full bg-black/5 dark:bg-black/30 border border-white/10 rounded-xl p-3 text-xs text-app-muted font-mono focus:outline-none focus:ring-1 focus:ring-app-primary/50 transition-all resize-none h-24 custom-scrollbar shadow-inner" spellcheck="false" data-i18n-placeholder="notationPlaceholder" placeholder="Paste notation here and click Apply to load a position…"></textarea>
          <button id="btn-copy-notation" class="w-full py-2 rounded-xl bg-white/5 hover:bg-white/10 border border-white/10 text-xs font-medium text-app-text transition-colors flex items-center justify-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
            <span data-i18n="btnCopy">Copy Notation</span>
          </button>
        </div>
      </div>
    </div>
  </aside>

  <!-- Bottom Left: Status (Desktop only) -->
  <div class="hidden md:flex absolute bottom-6 left-6 z-30 flex-col gap-2 pointer-events-none">
    <div class="glass-panel rounded-xl px-4 py-2 flex items-center gap-4 text-xs font-mono text-app-muted">
      <span id="status-cursor" class="w-8">—</span>
      <div class="w-px h-3 bg-white/20"></div>
      <span id="status-tool" class="min-w-[120px]">Tool: Black Stone</span>
      <div class="w-px h-3 bg-white/20"></div>
      <span id="status-move">Move: 1</span>
    </div>
    <div class="flex gap-2">
      <button id="btn-clear-lines" class="pointer-events-auto px-4 py-2 rounded-xl bg-app-primary/10 border border-app-primary/20 text-xs font-semibold text-app-primary-light hover:bg-app-primary/20 transition-colors shadow-sm" data-i18n="clearLines">Clear Lines</button>
      <button id="btn-clear" class="pointer-events-auto px-4 py-2 rounded-xl bg-[#f43f5e]/10 border border-[#f43f5e]/20 text-xs font-semibold text-[#f43f5e] hover:bg-[#f43f5e]/20 hover:text-[#fb7185] transition-colors shadow-sm" data-i18n="clear">Clear Board</button>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════════════
       MOBILE BOTTOM NAV
       ═══════════════════════════════════════════════════════════════════════ -->
  <nav id="mobile-nav" class="flex md:hidden fixed bottom-0 left-0 right-0 z-40 h-16 glass-panel border-t border-glass-border overflow-x-auto overflow-y-hidden snap-x" style="scrollbar-width: none; -ms-overflow-style: none;">
    <style>#mobile-nav::-webkit-scrollbar { display: none; }</style>
    <div class="flex items-center px-3 gap-3 mx-auto h-full min-w-max">
      <!-- Undo / Redo Group -->
      <div class="flex items-center gap-1 shrink-0 snap-center">
        <button id="btn-undo-mobile" class="w-11 h-11 rounded-full flex items-center justify-center text-app-muted hover:text-app-text hover:bg-white/10 transition-colors disabled:opacity-30" data-i18n-title="shortcutUndo">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"></path></svg>
        </button>
        <button id="btn-redo-mobile" class="w-11 h-11 rounded-full flex items-center justify-center text-app-muted hover:text-app-text hover:bg-white/10 transition-colors disabled:opacity-30" data-i18n-title="shortcutRedo">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 10h-10a8 8 0 00-8 8v2M21 10l-6 6m6-6l-6-6"></path></svg>
        </button>
      </div>

      <div class="w-px h-8 bg-white/10 shrink-0"></div>

      <!-- Tool Buttons (mobile) -->
      <div class="flex items-center gap-1 shrink-0">
        <button class="tool-btn-mobile tool-btn active w-11 h-11 rounded-full flex items-center justify-center transition-all snap-center" data-tool="stone_x" data-i18n-title="shortcutBlack">
          <div class="w-5 h-5 rounded-full bg-slate-900 border border-slate-700 shadow-md"></div>
        </button>
        <button class="tool-btn-mobile tool-btn w-11 h-11 rounded-full flex items-center justify-center transition-all snap-center" data-tool="stone_o" data-i18n-title="shortcutWhite">
          <div class="w-5 h-5 rounded-full bg-[#f5f0e8] border border-slate-300 shadow-md"></div>
        </button>
        <button class="tool-btn-mobile tool-btn w-11 h-11 rounded-full flex items-center justify-center transition-all snap-center text-app-muted" data-tool="block" data-i18n-title="shortcutBlock">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 4h16v16H4z M4 9h16 M4 14h16 M9 4v5 M15 9v5 M9 14v6"></path></svg>
        </button>
        <button class="tool-btn-mobile tool-btn w-11 h-11 rounded-full flex items-center justify-center transition-all snap-center text-app-muted" data-tool="hole" data-i18n-title="shortcutHole">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 2l8 4.5v9L12 22l-8-4.5v-9L12 2z"></path></svg>
        </button>
        <button class="tool-btn-mobile tool-btn w-11 h-11 rounded-full flex items-center justify-center transition-all snap-center text-app-muted" data-tool="line" data-i18n-title="shortcutLine">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 7l-10 10"></path></svg>
        </button>
        <button class="tool-btn-mobile tool-btn w-11 h-11 rounded-full flex items-center justify-center transition-all snap-center text-app-muted hover:text-app-accent hover:bg-app-accent/20" data-tool="eraser" data-i18n-title="shortcutEraser">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
        </button>
      </div>

      <div class="w-px h-8 bg-white/10 shrink-0"></div>
      
      <!-- Clear Board Quick Action -->
      <div class="flex items-center gap-1 shrink-0">
        <button id="btn-clear-mobile-quick" class="w-11 h-11 rounded-full flex items-center justify-center transition-all snap-center text-[#f43f5e] hover:bg-[#f43f5e]/10" data-i18n-title="clear">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
        </button>
      </div>
    </div>
  </nav>

  <!-- Pending portal hint (shared, works for both) -->
  <div id="pending-hole-hint-mobile" class="hidden md:hidden fixed bottom-16 left-2 right-2 z-40 glass-panel rounded-xl p-3 border-app-primary/50 bg-app-primary/10">
    <p class="text-sm text-app-primary-light font-medium flex items-center gap-2">
      <span class="animate-pulse">✦</span> Select destination portal
    </p>
    <button id="btn-cancel-portal-mobile" class="mt-2 w-full py-1.5 rounded-lg bg-white/5 hover:bg-white/10 border border-white/10 text-xs text-app-muted transition-colors" data-i18n="cancel">Cancel</button>
  </div>

  <!-- Modal -->
  <div id="modal-overlay" class="hidden fixed inset-0 z-[100] bg-black/60 backdrop-blur-sm flex items-center justify-center">
    <div id="modal" class="glass-panel rounded-2xl p-6 max-w-sm w-full mx-4 border-white/10 shadow-2xl flex flex-col gap-6 transform transition-all">
      <p id="modal-message" class="text-app-text text-center text-sm font-medium" data-i18n="modalDefaultMsg">Are you sure?</p>
      <div class="flex justify-end gap-3">
        <button id="modal-cancel" class="px-4 py-2 rounded-lg text-sm text-app-muted hover:text-app-text hover:bg-white/10 transition-colors" data-i18n="modalCancel">Cancel</button>
        <button id="modal-confirm" class="px-4 py-2 rounded-lg text-sm bg-app-accent/20 text-app-accent border border-app-accent/30 hover:bg-app-accent/30 transition-colors" data-i18n="modalConfirm">Confirm</button>
      </div>
    </div>
  </div>

  <div id="toast" class="fixed top-8 left-1/2 -translate-x-1/2 z-[100] px-4 py-2 rounded-full text-sm font-medium transition-all duration-300 opacity-0 translate-y-[-20px] pointer-events-none shadow-lg"></div>

  <!-- Scripts -->
  <script src="https://docs.opencv.org/4.8.0/opencv.js" type="text/javascript"></script>
  <script src="src/cv_pipeline.js"></script>
  <script src="src/constants.js"></script>
  <script src="src/i18n.js"></script>
  <script src="src/state.js"></script>
  <script src="src/renderer.js"></script>
  <script src="src/bitboard.js"></script>
  <script src="src/tree.js"></script>
  <script src="src/notation.js"></script>
  <script src="src/export.js"></script>
  <script src="src/app.js"></script>

</body>
